site_name: dawos-agent
site_description: PPP Router Management Agent - REST API for accel-ppp BNG nodes
site_url: https://cepat-kilat-teknologi.github.io/dawos-agent/
repo_url: https://github.com/Cepat-Kilat-Teknologi/dawos-agent
repo_name: Cepat-Kilat-Teknologi/dawos-agent

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - API Reference: api/reference.md
  - Development:
      - Contributing: development/contributing.md
      - Changelog: development/changelog.md
      - Security: development/security.md
