site_name: DawOS Agent
site_description: Broadband management, simplified. REST API for accel-ppp BNG nodes
site_url: https://cepat-kilat-teknologi.github.io/dawos-agent/
repo_url: https://github.com/Cepat-Kilat-Teknologi/dawos-agent
repo_name: Cepat-Kilat-Teknologi/dawos-agent

theme:
  name: material
  logo: assets/logo-icon.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Guides:
      - Troubleshooting: guides/troubleshooting.md
      - Upgrade: guides/upgrade.md
      - Monitoring Integration: guides/monitoring.md
      - Production Hardening: guides/production-hardening.md
      - Kernel Tuning: guides/kernel-tuning.md
  - API:
      - Reference: api/reference.md
      - Input Validation: api/validation-rules.md
  - Testing:
      - API Test Report: testing/test-report.md
      - Integration Test Report: testing/integration-test-report.md
  - Development:
      - Contributing: development/contributing.md
      - Changelog: development/changelog.md
      - Architecture Decisions: development/decisions.md
      - Security: development/security.md
